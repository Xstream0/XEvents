prefix: "<gray>[<gold><b>XEvents</b></gold><gray>]</gray> "

command:
  unknown-subcommand: "<red>Comando non riconosciuto. Usa <yellow>/xevents help</yellow> per la lista comandi."
  unknown-module: "<red>Nessun modulo trovato con id <yellow><id></yellow>."
  no-permission: "<red>Non hai il permesso per usare questo comando."
  players-only: "<red>Questo comando può essere usato solo da un giocatore in gioco."
  another-event-active: "<red>C'è già un altro evento attivo. Fermalo prima di avviarne un altro."

  help:
    header: "<gold><b>== XEvents - Comandi ==</b></gold>"
    list: "<yellow>/xevents list</yellow> <gray>- Elenca tutti gli eventi disponibili."
    gui: "<yellow>/xevents gui</yellow> <gray>- Apri il pannello di gestione eventi."
    start: "<yellow>/xevents start <id></yellow> <gray>- Avvia un evento."
    stop: "<yellow>/xevents stop</yellow> <gray>- Ferma l'evento attivo in modo ordinato."
    join: "<yellow>/xevents join</yellow> <gray>- Partecipa all'evento in corso."
    leave: "<yellow>/xevents leave</yellow> <gray>- Abbandona l'evento in corso."
    reload: "<yellow>/xevents reload</yellow> <gray>- Ricarica configurazione e messaggi."
    setstart: "<yellow>/xevents setstart</yellow> <gray>- [Lucky Block Race] Imposta il punto di partenza."
    setfinish: "<yellow>/xevents setfinish</yellow> <gray>- [Lucky Block Race] Imposta il punto di arrivo."
    setlobby: "<yellow>/xevents setlobby</yellow> <gray>- [Lucky Block Race] Imposta la lobby d'attesa."

  list:
    empty: "<red>Nessun modulo evento registrato."
    header: "<gold><b>== Eventi disponibili ==</b></gold>"
    entry: "<gray> - <yellow><id></yellow>: <white><name></white> <gray>(<aqua><state></aqua><gray>)"

  start:
    usage: "<red>Uso corretto: <yellow>/xevents start <id_evento></yellow>"
    not-ready: "<red>L'evento non è pronto per essere avviato:"
    issue-line: "<red> • <issue>"
    failed: "<red>Impossibile avviare l'evento."
    success: "<green>Evento <white><name></white> avviato con successo!"

  stop:
    none-active: "<red>Nessun evento attivo al momento."
    success: "<green>Evento fermato correttamente."

  forcestop:
    success: "<green>Evento interrotto forzatamente."

  join:
    none-active: "<red>Nessun evento attivo a cui partecipare al momento."

  leave:
    not-in-event: "<red>Non stai partecipando a nessun evento."
    success: "<green>Hai abbandonato l'evento."

  reload:
    success: "<green>Configurazione e messaggi ricaricati con successo."

  status:
    none-active: "<gray>Nessun evento attivo al momento."
    line: "<gray>Evento attivo: <white><name></white> <gray>- stato: <aqua><state></aqua>"
    lanes-line: "<gray>Corsie attive: <white><lanes></white> <gray>- In coda d'attesa: <yellow><waiting></yellow>"

gui:
  title: "<dark_gray>XEvents <gray>- Pannello eventi"
  close-item: "<red>Chiudi"
  lore:
    description: "<gray><description>"
    state: "<gray>Stato: <aqua><state></aqua>"
    ready: "<green>Pronto per essere avviato"
    not-ready: "<red>Configurazione incompleta:"
    issue: "<red>  - <issue>"
    click-start: "<yellow>Click per avviare"
    click-stop: "<yellow>Click per fermare"

luckyblockrace:

  setup:
    missing-start: "Punto di partenza non impostato (usa /xevents setstart)."
    missing-finish: "Punto di arrivo non impostato (usa /xevents setfinish)."
    different-worlds: "Partenza e arrivo si trovano in mondi diversi."
    no-outcomes: "Nessun esito configurato per i Lucky Block (controlla config.yml)."
    already-running: "Una Lucky Block Race è già in corso."
    start-set: "<green>Punto di partenza della Lucky Block Race impostato sulla tua posizione."
    finish-set: "<green>Punto di arrivo della Lucky Block Race impostato sulla tua posizione."
    lobby-set: "<green>Lobby d'attesa della Lucky Block Race impostata sulla tua posizione."

  join:
    not-open: "<red>Le iscrizioni alla Lucky Block Race non sono aperte in questo momento."
    already-joined: "<red>Sei già iscritto alla Lucky Block Race."
    broadcast: "<gold><player></gold> <gray>si è iscritto alla Lucky Block Race! <yellow>(<count> iscritti)"

  leave:
    broadcast: "<gold><player></gold> <gray>ha abbandonato la Lucky Block Race."

  queue:
    waiting: "<yellow>Tutte le corsie sono occupate: sei in coda d'attesa per la prossima gara."

