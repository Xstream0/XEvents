    race-started: "<gold><b>VIA!</b></gold> <gray>La Lucky Block Race è iniziata! Rompi i Lucky Block e corri verso il traguardo!"
    time-up: "<red><b>Tempo scaduto!</b></red> <gray>La corsa si chiude con la classifica attuale."
    player-finished: "<gold><player></gold> <gray>ha raggiunto il traguardo! <yellow>(posizione #<position>)"
    stopped-by-staff: "<red>La Lucky Block Race è stata interrotta dallo staff."
    finale-incoming: "<gold><b>Gran finale in arrivo!</b></gold> <gray>I finisher si affronteranno tra <white><seconds>s</white>!"
    finale-started: "<gold><b>COMBATTIMENTO FINALE!</b></gold> <gray>Che vinca il migliore!"
    winner: "<gold><b><player> ha vinto la Lucky Block Race!</b></gold>"
    no-winner: "<gray>La Lucky Block Race è terminata senza un vincitore."

  outcome:
    diamond: "<aqua><player></aqua> <gray>ha trovato dei diamanti nel Lucky Block!"
    iron: "<white><player></white> <gray>ha trovato del ferro nel Lucky Block!"
    food: "<green><player></green> <gray>ha trovato del cibo nel Lucky Block!"
    sword: "<yellow><player></yellow> <gray>ha trovato una spada nel Lucky Block!"
    speed: "<green><player></green> <gray>ha ottenuto un boost di velocità!"
    slowness: "<red><player></red> <gray>è stato rallentato!"
    blindness: "<dark_red><player></dark_red> <gray>è stato accecato temporaneamente!"
    tnt: "<red><b>TRAPPOLA!</b></red> <gray>Il Lucky Block di <player> era una TNT!"
    lightning: "<gray>Un fulmine scenico è caduto vicino a <player>!"
    mobs: "<dark_green>Un'orda di zombie è apparsa vicino a <player>!</dark_green>"
    teleport-forward: "<green><player></green> <gray>è stato catapultato avanti lungo il percorso!"
    teleport-back: "<red><player></red> <gray>è stato risucchiato indietro lungo il percorso!"
    nothing: "<gray>...e non è successo nulla. Che fortuna (o sfortuna), <player>."

  leaderboard:
    header: "<gold><b>== Classifica Lucky Block Race ==</b></gold>"
    line: "<yellow>#<position></yellow> <white><player></white> <gray>- <aqua><time>s</aqua> <gray>(<blocks> blocchi rotti)"