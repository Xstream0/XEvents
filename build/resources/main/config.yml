# ============================================================================
#  XEvents - config.yml
#  Plugin: XEvents | Autore: Xstream
# ============================================================================

modules:

  luckyblockrace:

    # Blocco usato come Lucky Block lungo il percorso.
    lucky-block-material: GOLD_BLOCK

    # Oggetto dato automaticamente a ogni giocatore quando parte la corsa, usato per
    # rompere i Lucky Block.
    start-item:
      material: DIAMOND_PICKAXE
      # Livello di Unbreaking applicato per evitare che si rompa durante la gara.
      unbreaking-level: 10

    # Distanza in blocchi tra un Lucky Block e il successivo lungo il percorso.
    block-interval: 4.0

    # Distanza dal punto di partenza prima del primo Lucky Block (evita un
    # blocco piazzato esattamente sotto i piedi dei giocatori alla partenza).
    start-offset: 3.0

    # Numero minimo di giocatori iscritti per far partire effettivamente la corsa
    # allo scadere del countdown. Se non raggiunto, l'evento viene annullato.
    min-players: 2

    # Numero massimo di corsie generabili in una singola gara. Se ci sono più
    # iscritti che corsie disponibili, gli iscritti in eccesso restano in coda
    # d'attesa per il turno successivo.
    max-lanes: 8

    # Distanza laterale (in blocchi) tra una corsia e quella adiacente.
    lane-spacing: 6.0

    # Durata del countdown di attesa (in secondi) dopo /xevents start luckyblockrace.
    countdown-seconds: 30

    # Durata massima della corsa in secondi prima che venga chiusa forzatamente
    # (classifica basata su chi è arrivato fino a quel momento).
    max-duration-seconds: 900

    # Se true, ogni ingresso/uscita di un giocatore viene annunciato ai partecipanti.
    broadcast-join-leave: true

    # ------------------------------------------------------------------------
    # Combattimento finale opzionale: se attivato, chi arriva al traguardo
    # attende in una piccola arena e si affronta in PvP per decidere il vero
    # vincitore. Se disattivato, vince semplicemente chi arriva primo.
    # ------------------------------------------------------------------------
    finale:
      enabled: false
      wait-seconds: 15
      countdown-seconds: 10
      arena-radius: 10.0

    # ------------------------------------------------------------------------
    # Possibili drop dei Lucky Block.
    # Ogni voce ha un "weight" (peso): più alto = più probabile. Un peso di 0
    # disabilita il drop senza doverlo cancellare.
    #
    # Tipi disponibili:
    #   GIVE_ITEM         -> dà uno o più oggetti
    #   POTION_EFFECT     -> applica un effetto di pozione
    #   TNT               -> fa esplodere TNT nel punto del blocco
    #   LIGHTNING         -> genera un fulmine
    #   SPAWN_MOBS        -> spawna mob attorno al giocatore
    #   BLOCK_EFFECT      -> effetto ambientale non dannoso
    #   TELEPORT_BACK     -> teletrasporta indietro lungo il percorso (penalità)
    #   TELEPORT_FORWARD  -> teletrasporta avanti lungo il percorso (bonus)
    #   COSMETIC          -> solo suono/messaggio, nessun altro effetto
    #   NOTHING           -> nessun effetto
    # ------------------------------------------------------------------------
    outcomes:

      diamante:
        type: GIVE_ITEM
        weight: 6
        items: [DIAMOND]
        min-amount: 1
        max-amount: 2
        message: "luckyblockrace.outcome.diamond"
        sound: ENTITY_PLAYER_LEVELUP

      ferro:
        type: GIVE_ITEM
        weight: 10
        items: [IRON_INGOT]
        min-amount: 2
        max-amount: 5
        message: "luckyblockrace.outcome.iron"
        sound: ENTITY_ITEM_PICKUP

      cibo:
        type: GIVE_ITEM
        weight: 12
        items: [COOKED_BEEF, BREAD, GOLDEN_CARROT]
        min-amount: 1
        max-amount: 3
        message: "luckyblockrace.outcome.food"
        sound: ENTITY_ITEM_PICKUP

      spada-incantata:
        type: GIVE_ITEM
        weight: 3
        items: [IRON_SWORD]
        min-amount: 1
        max-amount: 1
        message: "luckyblockrace.outcome.sword"
        sound: ENTITY_PLAYER_LEVELUP

      velocita:
        type: POTION_EFFECT
        weight: 10
        effect: SPEED
        duration-seconds: 20
        amplifier: 1
        message: "luckyblockrace.outcome.speed"
        sound: ENTITY_FIREWORK_ROCKET_BLAST

      lentezza:
        type: POTION_EFFECT
        weight: 8
        effect: SLOWNESS
        duration-seconds: 8
        amplifier: 1
        message: "luckyblockrace.outcome.slowness"
        sound: ENTITY_VILLAGER_NO

      cecita:
        type: POTION_EFFECT
        weight: 5
        effect: BLINDNESS
        duration-seconds: 5
        amplifier: 0
        message: "luckyblockrace.outcome.blindness"
        sound: ENTITY_VILLAGER_NO

      tnt-trappola:
        type: TNT
        weight: 6
        power: 0.0
        breaks-blocks: false
        message: "luckyblockrace.outcome.tnt"
        sound: ENTITY_TNT_PRIMED

      fulmine-scenico:
        type: LIGHTNING
        weight: 4
        damaging: false
        message: "luckyblockrace.outcome.lightning"

      zombie-orda:
        type: SPAWN_MOBS
        weight: 6
        mob: ZOMBIE
        count: 3
        message: "luckyblockrace.outcome.mobs"
        sound: ENTITY_ZOMBIE_AMBIENT

      bonus-avanti:
        type: TELEPORT_FORWARD
        weight: 5
        blocks: 6
        message: "luckyblockrace.outcome.teleport-forward"
        sound: ENTITY_ENDERMAN_TELEPORT

      penalita-indietro:
        type: TELEPORT_BACK
        weight: 5
        blocks: 6
        message: "luckyblockrace.outcome.teleport-back"
        sound: ENTITY_ENDERMAN_TELEPORT

      niente:
        type: NOTHING
        weight: 8
        message: "luckyblockrace.outcome.nothing"
        sound: BLOCK_NOTE_BLOCK_BASS